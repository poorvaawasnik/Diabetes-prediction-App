<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Login | DiabetesCare AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BACKGROUND (CALM BLUE SHADE) */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:"Segoe UI",sans-serif;
margin:0;

/* calm blue gradient */
background: linear-gradient(135deg, #e0ecff, #c7dbff);
}

/* SOFT BLUE GLOW */

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:#3b82f6;
filter:blur(120px);
opacity:0.15;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:0;
}

/* CARD (WHITE CLEAN) */

.card{
width:400px;
padding:35px;
border-radius:16px;
background:white;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
z-index:2;
animation:fadeIn 0.5s ease;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* TITLE */

.title{
font-weight:700;
color:#111827;
}

/* SUBTEXT */

.subtext{
color:#6b7280;
font-size:14px;
}

/* INPUT */

.form-control{
border-radius:10px;
padding:12px;
border:1px solid #e5e7eb;
transition:0.2s;
}

.form-control:focus{
border-color:#3b82f6;
box-shadow:0 0 0 0.1rem rgba(59,130,246,0.15);
}

/* BUTTON */

.btn-main{
background:#2563eb;
border:none;
border-radius:10px;
padding:12px;
color:white;
font-weight:600;
transition:0.2s;
}

.btn-main:hover{
background:#1d4ed8;
transform:translateY(-1px);
}

/* LINK */

.link{
text-decoration:none;
color:#2563eb;
font-weight:500;
}

.link:hover{
text-decoration:underline;
}

/* PASSWORD ICON */

.eye-icon{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h3 class="text-center title mb-2">
🩺 DiabetesCare AI
</h3>

<p class="text-center subtext mb-4">
Login to your account
</p>

<div class="text-danger text-center mb-2">
{{ error }}
</div>

<form method="POST" onsubmit="handleLogin()">

<input class="form-control mb-3" name="username" placeholder="Username" required>

<div class="position-relative mb-3">
<input type="password" id="password" name="password" class="form-control" placeholder="Password" required>

<span class="eye-icon" onclick="togglePassword()">👁️</span>
</div>

<button id="loginBtn" class="btn btn-main w-100">
Login
</button>

</form>

<div class="text-center mt-3">
<a href="/register" class="link">
Create Account
</a>
</div>

</div>

<script>

function togglePassword(){
let pass=document.getElementById("password");
pass.type=pass.type==="password"?"text":"password";
}

function handleLogin(){
let btn=document.getElementById("loginBtn");
btn.innerText="Logging in...";
btn.disabled=true;
}

</script>

</body>
</html>
