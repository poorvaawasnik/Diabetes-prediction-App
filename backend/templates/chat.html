<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Health Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
font-family:"Segoe UI",sans-serif;
}

/* NAVBAR */

.navbar{
background:white !important;
border-bottom:1px solid #eee;
}

.navbar-brand{
font-weight:700;
color:#2f64ff !important;
}

.explore-btn{
background:#3b82f6;
border:none;
border-radius:20px;
padding:6px 14px;
color:white;
}

.explore-btn:hover{
background:#2563eb;
}

/* MAIN */

.main{
margin-top:80px;
}

/* CHAT UI */

.card-box{
background:white;
border-radius:18px;
padding:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
border:1px solid #e6ecf5;
}

.title{
font-weight:700;
font-size:26px;
}

.chatbox{
height:450px;
overflow-y:auto;
padding:20px;
background:#fafbff;
border-radius:12px;
scroll-behavior:smooth;
}

.message{
display:flex;
gap:12px;
margin-bottom:15px;
align-items:flex-start;
}

.user{
justify-content:flex-end;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.user-msg{
background:linear-gradient(135deg,#dbe8ff,#cddcff);
padding:12px 16px;
border-radius:16px;
max-width:60%;
font-size:15px;
}

.bot-msg{
background:#f1f3f6;
padding:12px 16px;
border-radius:16px;
max-width:600px;
line-height:1.7;
font-size:15px;
}

.input-box{
display:flex;
gap:10px;
margin-top:20px;
}

.send-btn{
background:#4a6cf7;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
}

.dot{
height:8px;
width:8px;
margin-right:4px;
background:#888;
border-radius:50%;
display:inline-block;
animation:blink 1.4s infinite;
}

.dot:nth-child(2){ animation-delay:.2s; }
.dot:nth-child(3){ animation-delay:.4s; }

@keyframes blink{
0%,80%,100%{opacity:0}
40%{opacity:1}
}

</style>

</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm">
<div class="container-fluid">

<a class="navbar-brand" href="/featureslogin">
🩺 DiabetesCare AI
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/featureslogin">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="/chat">AI Assistant</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/history">History</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/profile">Profile</a>
</li>

<li class="nav-item ms-2">
<a class="btn btn-primary btn-sm" href="/home">🧠 Predict</a>
</li>

<li class="nav-item ms-2">
<a class="btn explore-btn btn-sm" href="/featureslogin">🚀 Explore</a>
</li>

<li class="nav-item ms-2">
<a class="btn btn-warning btn-sm" href="/logout">Logout</a>
</li>

</ul>

</div>
</div>
</nav>

<!-- 🔥 MAIN CHAT -->
<div class="container main py-4">

<div class="card-box">

<div class="d-flex justify-content-between mb-4">

<div>
<h4 class="title">🤖 AI Health Assistant</h4>
<small class="text-success">● Online</small>
</div>

<div>
<span class="badge bg-light text-dark">
Compliant Session
</span>
</div>

</div>

<div id="chatbox" class="chatbox">

<div class="message">
<img src="/static/ai.png" class="avatar">
<div class="bot-msg">
Hello! I'm your personal diabetes health assistant.
</div>
</div>

</div>

<div class="input-box">

<input id="msg" class="form-control"
placeholder="Describe symptoms or clinical queries...">

<button onclick="send()" class="send-btn">
Send
</button>

</div>

</div>

</div>

<script>

const userAvatar="/static/user.png"
const botAvatar="/static/ai.png"

function formatResponse(text){
text = text.replace(/\n/g,"<br>")
text = text.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")
return text
}

function send(){

let msg=document.getElementById("msg").value
if(msg.trim()==="") return

let chatbox=document.getElementById("chatbox")

chatbox.innerHTML+=`
<div class="message user">
<div class="user-msg">${msg}</div>
<img src="${userAvatar}" class="avatar">
</div>
`

chatbox.scrollTop=chatbox.scrollHeight

chatbox.innerHTML+=`
<div class="message" id="typing">
<img src="${botAvatar}" class="avatar">
<div class="bot-msg">
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>
</div>
`

fetch("/chatbot",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
})
.then(res=>res.json())
.then(data=>{

document.getElementById("typing").remove()

let reply=formatResponse(data.reply)
let responseId="bot_"+Date.now()

chatbox.innerHTML+=`
<div class="message">
<img src="${botAvatar}" class="avatar">
<div class="bot-msg">
<span id="${responseId}"></span>
</div>
</div>
`

document.getElementById(responseId).innerHTML = reply
document.getElementById("msg").value=""
chatbox.scrollTop=chatbox.scrollHeight

})

}

document.getElementById("msg").addEventListener("keypress",function(e){
if(e.key==="Enter"){ send() }
})

</script>

</body>
</html>
