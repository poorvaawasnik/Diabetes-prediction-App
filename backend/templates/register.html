<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Register | DiabetesCare AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BACKGROUND (CALM BLUE) */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:"Segoe UI",sans-serif;
margin:0;

/* calm blue gradient */
background: linear-gradient(135deg, #e0ecff, #c7dbff);
}

/* SOFT GLOW */

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:#3b82f6;
filter:blur(120px);
opacity:0.15;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:0;
}

/* CARD */

.card{
width:400px;
padding:35px;
border-radius:16px;
background:white;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
z-index:2;
animation:fadeIn 0.5s ease;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* TITLE */

.title{
font-weight:700;
color:#111827;
}

/* INPUT */

.form-control{
border-radius:10px;
padding:12px;
border:1px solid #e5e7eb;
transition:0.2s;
}

.form-control:focus{
border-color:#3b82f6;
box-shadow:0 0 0 0.1rem rgba(59,130,246,0.15);
}

/* BUTTON */

.btn-main{
background:#2563eb;
border:none;
border-radius:10px;
padding:12px;
color:white;
font-weight:600;
transition:0.2s;
}

.btn-main:hover{
background:#1d4ed8;
transform:translateY(-1px);
}

/* LINK */

.login-link{
text-decoration:none;
color:#2563eb;
font-weight:500;
}

.login-link:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="card">

<h3 class="text-center title mb-3">
🩺 DiabetesCare AI
</h3>

<p class="text-center text-muted mb-4">
Create your account
</p>

<form method="POST">

<input class="form-control mb-3" name="username" placeholder="Username" required>

<input class="form-control mb-3" name="email" placeholder="Email" required>

<input type="password" class="form-control mb-3" name="password" placeholder="Password" required>

<button class="btn btn-main w-100">
Register
</button>

</form>

<div class="text-center mt-3">
<a href="/login" class="login-link">
Back to Login
</a>
</div>

</div>

</body>
</html>
