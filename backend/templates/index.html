<!DOCTYPE html>
<html>
<head>
<title>Diabetes Prediction</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#eef2ff,#f8fafc);
min-height:100vh;
font-family:"Segoe UI",sans-serif;
}

/* Navbar */

.navbar{
background:white !important;
border-bottom:1px solid #eee;
}

.navbar-brand{
font-weight:700;
color:#2f64ff !important;
}

/* Explore Button */

.explore-btn{
background:#3b82f6;
border:none;
border-radius:20px;
padding:6px 14px;
font-weight:500;
color:white;
}

.explore-btn:hover{
background:#2563eb;
color:white;
}

/* Card */

.card{
border-radius:18px;
border:none;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

/* Title */

.title{
font-weight:700;
color:#2f64ff;
}

/* Inputs */

.form-control,
.form-select{
border-radius:12px;
padding:12px;
border:1px solid #e6ecf5;
transition:0.3s;
}

.form-control:focus,
.form-select:focus{
border-color:#2f64ff;
box-shadow:0 0 0 0.15rem rgba(47,100,255,0.15);
}

/* Button */

.btn-success{
background:#2f64ff;
border:none;
border-radius:30px;
padding:12px 40px;
font-weight:600;
transition:0.3s;
}

.btn-success:hover{
background:#1e4fe0;
transform:translateY(-2px);
}

/* Result */

.alert{
border-radius:15px;
font-size:18px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm">
<div class="container-fluid">

<a class="navbar-brand" href="/home">
🩺 DiabetesCare AI
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/home">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/dashboard">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/chat">AI Assistant</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/history">History</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/profile">Profile</a>
</li>

<!-- EXPLORE BUTTON -->

<li class="nav-item me-2">
<a class="btn explore-btn btn-sm" href="/featureslogin">
🚀 Explore
</a>
</li>

<!-- LOGOUT -->

<li class="nav-item">
<a class="btn btn-warning btn-sm" href="/logout">Logout</a>
</li>

</ul>

</div>
</div>
</nav>

<!-- FORM -->
<div class="container mt-5">

<div class="card p-5">

<h2 class="text-center title mb-4">
🧠 Diabetes Prediction System
</h2>

<form method="POST">

<div class="row g-3">

<div class="col-md-4">
<input type="number" class="form-control" name="Pregnancies" placeholder="Pregnancies" required>
</div>

<div class="col-md-4">
<input type="number" class="form-control" name="Glucose" placeholder="Glucose (mg/dL)" required>
</div>

<div class="col-md-4">
<input type="number" class="form-control" name="BloodPressure" placeholder="Blood Pressure (mm Hg)" required>
</div>

<div class="col-md-4">
<input type="number" class="form-control" name="SkinThickness" placeholder="Skin Thickness (mm)" required>
</div>

<div class="col-md-4">
<input type="number" class="form-control" name="Insulin" placeholder="Insulin (mu U/ml)" required>
</div>

<div class="col-md-4">
<input type="number" step="any" class="form-control" id="height" placeholder="Height (cm)" required>
</div>

<div class="col-md-4">
<input type="number" step="any" class="form-control" id="weight" placeholder="Weight (kg)" required>
</div>

<input type="hidden" name="BMI" id="bmi">

<div class="col-md-4">
<input type="number" step="any" class="form-control" name="DiabetesPedigreeFunction" placeholder="Diabetes Pedigree Function" required>
</div>

<div class="col-md-4">
<input type="number" class="form-control" name="Age" placeholder="Age" required>
</div>

<div class="col-md-4">
<select class="form-select" name="FamilyHistory" required>
<option value="" disabled selected>Family History?</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div class="col-md-4">
<select class="form-select" name="PhysicalActivity" required>
<option value="" disabled selected>Physical Activity Level</option>
<option value="1">Active</option>
<option value="0">Sedentary</option>
</select>
</div>

</div>

<div class="text-center mt-4">

<button type="submit" class="btn btn-success">
🔍 Predict
</button>

</div>

</form>

{% if result %}

<div class="alert alert-info text-center mt-4">
<h5><strong>Prediction:</strong> {{ result }}</h5>
<h6><strong>Risk Score:</strong> {{ risk_score }}%</h6>
</div>

<!-- EXPLORE CTA AFTER RESULT -->

<div class="text-center mt-3">
<a href="/featureslogin" class="btn btn-primary">
🚀 Explore Full Dashboard
</a>
</div>

{% endif %}

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

document.querySelector("form").addEventListener("submit", function(e){

let height=document.getElementById("height").value
let weight=document.getElementById("weight").value

if(!height||!weight){
alert("Please enter height and weight.")
e.preventDefault()
return
}

height=height/100
let bmi=weight/(height*height)

if(!bmi||isNaN(bmi)){
alert("BMI calculation failed.")
e.preventDefault()
return
}

document.getElementById("bmi").value=bmi.toFixed(2)

})

</script>

</body>
</html>
